    <canvas id="myCanvas" width="1080" height="1080"></canvas>
   
  <script>
    // Canvas renderer script adapted from provided index.html
    // (kept intact so API can call window.__renderAndGetDataURL(json))
    const imageCache = new Map();
    const imageBlobCache = new Map(); // Cache for image blobs
    const fontCache = new Map();
    const fontDataCache = new Map(); // Cache for font ArrayBuffers

    // Additional caches for performance optimization
    const textWrapCache = new Map();        // Cache for text wrapping results
    const gradientCache = new Map();        // Cache for gradient objects
    const elementRenderCache = new Map();   // Cache for pre-rendered complex elements
    const cropRectCache = new Map();        // Cache for crop rectangle calculations

    // Track active blob URLs for cleanup (memory leak prevention)
    const activeBlobUrls = new Set();

    // Cache statistics for monitoring
    const cacheStats = {
      textWrap: { hits: 0, misses: 0 },
      gradient: { hits: 0, misses: 0 },
      elementRender: { hits: 0, misses: 0 },
      cropRect: { hits: 0, misses: 0 }
    };

    // Utility function to generate cache keys
    function generateCacheKey(...parts) {
      return parts.map(p => {
        if (typeof p === 'object') return JSON.stringify(p);
        return String(p);
      }).join('|');
    }

    // Function to clear all caches (useful for memory management)
    window.__clearRenderCaches = function() {
      // Revoke any remaining blob URLs to prevent memory leaks
      activeBlobUrls.forEach(url => {
        try { URL.revokeObjectURL(url); } catch (e) {}
      });
      activeBlobUrls.clear();

      // Clear ALL caches
      imageCache.clear();
      imageBlobCache.clear();
      fontCache.clear();
      fontDataCache.clear();
      textWrapCache.clear();
      gradientCache.clear();
      elementRenderCache.clear();
      cropRectCache.clear();
      console.log('[Cache] All render caches cleared (including images and fonts)');
    };

    // Function to get cache statistics
    window.__getCacheStats = function() {
      return {
        stats: { ...cacheStats },
        sizes: {
          images: imageCache.size,
          imageBlobs: imageBlobCache.size,
          fonts: fontCache.size,
          fontData: fontDataCache.size,
          textWrap: textWrapCache.size,
          gradient: gradientCache.size,
          elementRender: elementRenderCache.size,
          cropRect: cropRectCache.size
        }
      };
    };

    // Performance profiling
    const performanceProfile = {
      fontLoading: { total: 0, count: 0, items: [] },
      imageLoading: { total: 0, count: 0, items: [] },
      textWrapping: { total: 0, count: 0 },
      gradientCreation: { total: 0, count: 0 },
      elementDrawing: {
        total: 0,
        byType: {
          text: { total: 0, count: 0 },
          shape: { total: 0, count: 0 },
          image: { total: 0, count: 0 },
          logo: { total: 0, count: 0 },
          cta: { total: 0, count: 0 }
        }
      },
      renderSetup: 0,
      fontPreload: 0,
      mainRenderLoop: 0,
      totalRender: 0
    };

    function resetPerformanceProfile() {
      performanceProfile.fontLoading = { total: 0, count: 0, items: [] };
      performanceProfile.imageLoading = { total: 0, count: 0, items: [] };
      performanceProfile.textWrapping = { total: 0, count: 0 };
      performanceProfile.gradientCreation = { total: 0, count: 0 };
      performanceProfile.elementDrawing = {
        total: 0,
        byType: {
          text: { total: 0, count: 0 },
          shape: { total: 0, count: 0 },
          image: { total: 0, count: 0 },
          logo: { total: 0, count: 0 },
          cta: { total: 0, count: 0 }
        }
      };
      performanceProfile.renderSetup = 0;
      performanceProfile.fontPreload = 0;
      performanceProfile.mainRenderLoop = 0;
      performanceProfile.totalRender = 0;
    }

    window.__getPerformanceProfile = function() {
      return JSON.parse(JSON.stringify(performanceProfile));
    };

    // --- NEW: Bounding Box Styles ---
    const BBOX_COLORS = {
      // Core elements
      'image': [255, 0, 0],  // Red
      'headline': [0, 255, 0],  // Green
      'logo': [0, 0, 255],  // Blue
      'body': [128, 128, 128],  // Gray

      // Text elements
      'subhead': [255, 165, 0],  // Orange
      'subheading': [255, 165, 0],  // Orange (alternative naming)
      'text': [75, 0, 130],  // Indigo
      'caption': [255, 20, 147],  // Deep Pink
      'title': [34, 139, 34],  // Forest Green
      'subtitle': [255, 140, 0],  // Dark Orange

      // Interactive elements
      'cta': [157, 0, 255],  // Purple
      'button': [220, 20, 60],  // Crimson
      'link': [30, 144, 255],  // Dodger Blue

      // Design elements
      'graphicShape': [255, 128, 0],  // Orange
      'shape': [255, 215, 0],  // Gold
      'icon': [72, 61, 139],  // Dark Slate Blue
      'decoration': [218, 112, 214],  // Orchid

      // Layout elements
      'container': [169, 169, 169],  // Dark Gray
      'background': [245, 245, 245],  // White Smoke
      'section': [192, 192, 192],  // Silver
      'divider': [105, 105, 105],  // Dim Gray
      'line': [105, 105, 105],  // Dim Gray (for line elements)

      // Media elements
      'video': [178, 34, 34],  // Firebrick
      'audio': [153, 50, 204],  // Dark Orchid
      'graphic': [255, 99, 71],  // Tomato

      // Navigation elements
      'nav': [0, 128, 128],  // Teal
      'menu': [0, 100, 0],  // Dark Green
      'breadcrumb': [184, 134, 11],  // Dark Goldenrod

      // Form elements
      'input': [70, 130, 180],  // Steel Blue
      'form': [123, 104, 238],  // Medium Slate Blue
      'checkbox': [50, 205, 50],  // Lime Green
      'radio': [255, 69, 0],  // Orange Red

      // Default fallback
      'default': [128, 128, 128]  // Gray
    };
    // --- END NEW ---

    function getBoundingBoxMeta(child) {
      // Support both 'class' (new format) and 'elementType'/'type' (old format)
      const key = child.class || child.elementType || child.type || 'default';
      const colorTuple = BBOX_COLORS[key] || BBOX_COLORS['default'];
      return {
        key,
        colorTuple,
        color: `rgb(${colorTuple.join(', ')})`
      };
    }

    // --- FIX START ---
    // Removed the unnecessary and error-causing XMLHttpRequest for 'layout.json'.
    // We now rely on this simple default object as a fallback, which the API
    // will always override by injecting `window.__JSON_DATA__`.
    const jsonData = {
      data: {
        width: 1080,
        height: 1080,
        background: '#ffffff',
        children: []
      }
    };
    // --- FIX END ---

    async function loadImage(src) {
      const perfStart = performance.now();

      // Handle undefined/null/empty src
      if (!src) {
        console.warn('[Image] No source URL provided, skipping');
        return null;
      }

      if (imageCache.has(src)) {
        console.log(`[Image] Using cached image: ${src.substring(0, 60)}`);
        return imageCache.get(src);
      }

      const p = new Promise(async (resolve, reject) => {
        // Handle data URLs directly
        if (src.startsWith('data:')) {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
          return;
        }

        // For absolute file paths, try to convert to a server-relative path
        let processedSrc = src;
        if (src.startsWith('/var/') || src.startsWith('/Users/') || src.startsWith('/home/')) {
          console.warn(`[Image] Absolute file path detected: ${src}`);
          const filename = src.split('/').pop();
          processedSrc = `./${filename}`;
          console.log(`[Image] Attempting to use relative path: ${processedSrc}`);
        }

        const img = new Image();
        const isRemote = processedSrc.startsWith('http://') || processedSrc.startsWith('https://');

        // For relative paths (API proxy), use fetch with aggressive caching
        if (processedSrc.startsWith('/')) {
          try {
            // Check blob cache first
            if (imageBlobCache.has(src)) {
              console.log(`[Image] Using blob cache: ${src.substring(0, 60)}`);
              const blob = imageBlobCache.get(src);
              const blobUrl = URL.createObjectURL(blob);
              activeBlobUrls.add(blobUrl);
              img.onload = () => {
                URL.revokeObjectURL(blobUrl);
                activeBlobUrls.delete(blobUrl);
                const perfEnd = performance.now();
                const duration = perfEnd - perfStart;
                performanceProfile.imageLoading.total += duration;
                performanceProfile.imageLoading.count++;
                performanceProfile.imageLoading.items.push({ src: src.substring(0, 60), duration });
                resolve(img);
              };
              img.onerror = () => {
                URL.revokeObjectURL(blobUrl);
                activeBlobUrls.delete(blobUrl);
                reject(new Error(`Failed to load image from blob: ${src.substring(0, 60)}`));
              };
              img.src = blobUrl;
              return;
            }

            // Fetch with aggressive caching
            const response = await fetch(processedSrc, {
              cache: 'force-cache', // Use browser cache aggressively
              credentials: 'same-origin'
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const blob = await response.blob();
            imageBlobCache.set(src, blob); // Store blob for future use

            const blobUrl = URL.createObjectURL(blob);
            activeBlobUrls.add(blobUrl);
            img.onload = () => {
              URL.revokeObjectURL(blobUrl);
              activeBlobUrls.delete(blobUrl);
              const perfEnd = performance.now();
              const duration = perfEnd - perfStart;
              performanceProfile.imageLoading.total += duration;
              performanceProfile.imageLoading.count++;
              performanceProfile.imageLoading.items.push({ src: src.substring(0, 60), duration });
              console.log(`[Image] ✓ Successfully loaded via fetch: ${src.substring(0, 60)}`);
              resolve(img);
            };
            img.onerror = () => {
              URL.revokeObjectURL(blobUrl);
              activeBlobUrls.delete(blobUrl);
              reject(new Error(`Failed to load image: ${src.substring(0, 60)}`));
            };
            img.src = blobUrl;
            return;
          } catch (fetchErr) {
            console.warn(`[Image] Fetch failed, falling back to direct load: ${fetchErr.message}`);
            // Fall through to direct loading
          }
        }

        // Direct loading for remote URLs or fallback
        if (isRemote) {
          img.crossOrigin = "anonymous";
        }

        img.onload = () => {
          const perfEnd = performance.now();
          const duration = perfEnd - perfStart;
          performanceProfile.imageLoading.total += duration;
          performanceProfile.imageLoading.count++;
          performanceProfile.imageLoading.items.push({ src: src.substring(0, 60), duration });
          console.log(`[Image] ✓ Successfully loaded: ${src.substring(0, 60)}`);
          resolve(img);
        };

        img.onerror = (err) => {
          // If remote with CORS failed, try without CORS
          if (isRemote && img.crossOrigin) {
            console.warn(`[Image] CORS load failed for ${src.substring(0, 60)}, retrying without CORS...`);
            const img2 = new Image();
            img2.onload = () => resolve(img2);
            img2.onerror = (err2) => {
              console.error(`[Image] ✗ Failed to load: ${src.substring(0, 60)}`, err2);
              reject(err2);
            };
            img2.src = processedSrc;
          } else {
            console.error(`[Image] ✗ Failed to load: ${src.substring(0, 60)}`, err);
            reject(err);
          }
        };

        img.src = processedSrc;
      });

      // Cache the promise, but remove it if it fails to prevent caching failures
      imageCache.set(src, p);
      p.catch(() => {
        imageCache.delete(src);
        imageBlobCache.delete(src);
        console.log(`[Image] Removed failed image from cache: ${src.substring(0, 60)}`);
      });

      return p;
    }

  async function ensureFontLoaded(fontFamily, srcUrl, descriptors = {}) {
    const perfStart = performance.now();
    const family = fontFamily || descriptors.name;
    if (!family) {
      console.warn('[Font] No font family provided');
      return false;
    }
    if (!srcUrl) {
      console.warn(`[Font] No source URL for font: ${family}`);
      return false;
    }
    const key = `${family}|${srcUrl}|${descriptors.weight || 'normal'}|${descriptors.style || 'normal'}`;

    // Check if font is already loaded in cache
    if (fontCache.has(key)) {
      console.log(`[Font] Using cached font: ${family}`);
      return fontCache.get(key);
    }

    console.log(`[Font] Loading: ${family} (weight: ${descriptors.weight || 'normal'}, style: ${descriptors.style || 'normal'}) from ${srcUrl.substring(0, 60)}...`);

    const loader = (async () => {
      try {
        let buffer;

        // Check if we have the font data cached
        if (fontDataCache.has(srcUrl)) {
          console.log(`[Font] Using cached font data: ${family}`);
          buffer = fontDataCache.get(srcUrl);
        } else {
          // Fetch with aggressive caching
          console.log(`[Font] Fetching font data: ${family}`);
          const resp = await fetch(srcUrl, {
            cache: 'force-cache', // Use browser cache aggressively
            credentials: 'same-origin'
          });

          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

          buffer = await resp.arrayBuffer();
          fontDataCache.set(srcUrl, buffer); // Cache the font data
          console.log(`[Font] Cached font data for: ${family}`);
        }

        // Create and load the font face
        const ff = new FontFace(family, buffer, descriptors);
        await ff.load();
        document.fonts.add(ff);

        const perfEnd = performance.now();
        const duration = perfEnd - perfStart;
        performanceProfile.fontLoading.total += duration;
        performanceProfile.fontLoading.count++;
        performanceProfile.fontLoading.items.push({ family, duration });
        console.log(`[Font] ✓ Successfully loaded: ${family} (${duration.toFixed(2)}ms)`);
        return true;
      } catch (err) {
        console.error(`[Font] ✗ Failed to load font ${family} from ${srcUrl.substring(0, 60)}:`, err.message);

        // Try fallback with URL method
        try {
          console.log(`[Font] Attempting fallback URL method for: ${family}`);
          const ff = new FontFace(family, `url(${srcUrl})`, descriptors);
          await ff.load();
          document.fonts.add(ff);

          const perfEnd = performance.now();
          const duration = perfEnd - perfStart;
          performanceProfile.fontLoading.total += duration;
          performanceProfile.fontLoading.count++;
          performanceProfile.fontLoading.items.push({ family, duration });
          console.log(`[Font] ✓ Successfully loaded via URL fallback: ${family}`);
          return true;
        } catch (fallbackErr) {
          console.error(`[Font] ✗ Fallback also failed for ${family}:`, fallbackErr.message);
          return false;
        }
      }
    })();

    // Cache the promise, but remove it if it fails to prevent caching failures
    fontCache.set(key, loader);
    loader.then(success => {
      if (!success) {
        fontCache.delete(key);
        fontDataCache.delete(srcUrl);
        console.log(`[Font] Removed failed font from cache: ${family}`);
      }
    }).catch(() => {
      fontCache.delete(key);
      fontDataCache.delete(srcUrl);
      console.log(`[Font] Removed failed font from cache: ${family}`);
    });

    return loader;
  }

    function drawRoundedRect(ctx, x, y, width, height, radiusTopLeft, radiusTopRight, radiusBottomRight, radiusBottomLeft) {
      // Cap corner radii to prevent overlap
      // Maximum radius is half the smallest dimension
      const maxRadiusX = width / 2;
      const maxRadiusY = height / 2;
      
      // Cap each corner radius
      const rtl = Math.min(radiusTopLeft, maxRadiusX, maxRadiusY);
      const rtr = Math.min(radiusTopRight, maxRadiusX, maxRadiusY);
      const rbr = Math.min(radiusBottomRight, maxRadiusX, maxRadiusY);
      const rbl = Math.min(radiusBottomLeft, maxRadiusX, maxRadiusY);
      
      // Also ensure that the sum of radii on each side doesn't exceed the width/height
      const topRadiiSum = rtl + rtr;
      const bottomRadiiSum = rbl + rbr;
      const leftRadiiSum = rtl + rbl;
      const rightRadiiSum = rtr + rbr;
      
      let scaleX = 1;
      let scaleY = 1;
      
      if (topRadiiSum > width) scaleX = Math.min(scaleX, width / topRadiiSum);
      if (bottomRadiiSum > width) scaleX = Math.min(scaleX, width / bottomRadiiSum);
      if (leftRadiiSum > height) scaleY = Math.min(scaleY, height / leftRadiiSum);
      if (rightRadiiSum > height) scaleY = Math.min(scaleY, height / rightRadiiSum);
      
      const scale = Math.min(scaleX, scaleY);
      
      const finalRTL = rtl * scale;
      const finalRTR = rtr * scale;
      const finalRBR = rbr * scale;
      const finalRBL = rbl * scale;
      
      ctx.beginPath();
      ctx.moveTo(x + finalRTL, y);
      ctx.lineTo(x + width - finalRTR, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + finalRTR);
      ctx.lineTo(x + width, y + height - finalRBR);
      ctx.quadraticCurveTo(x + width, y + height, x + width - finalRBR, y + height);
      ctx.lineTo(x + finalRBL, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - finalRBL);
      ctx.lineTo(x, y + finalRTL);
      ctx.quadraticCurveTo(x, y, x + finalRTL, y);
      ctx.closePath();
    }

    function clipRoundedRectIfNeeded(ctx, x, y, w, h, child) {
      const tl = Number(child.cornerRadiusTopLeft) || 0;
      const tr = Number(child.cornerRadiusTopRight) || 0;
      const br = Number(child.cornerRadiusBottomRight) || 0;
      const bl = Number(child.cornerRadiusBottomLeft) || 0;
      if (tl || tr || br || bl) {
        ctx.save();
        drawRoundedRect(ctx, x, y, w, h, tl, tr, br, bl);
        ctx.clip();
        return true;
      }
      return false;
    }

    function computeCropSourceRect(child, img) {
      const iw = Math.max(1, child.imageWidth || img.naturalWidth || 1);
      const ih = Math.max(1, child.imageHeight || img.naturalHeight || 1);

      // Generate cache key
      const cacheKey = generateCacheKey(
        child.id || child.src,
        iw, ih,
        child.cropX, child.cropY,
        child.cropWidth, child.cropHeight
      );

      // Check cache first
      if (cropRectCache.has(cacheKey)) {
        cacheStats.cropRect.hits++;
        return cropRectCache.get(cacheKey);
      }

      cacheStats.cropRect.misses++;

      let cx = Number.isFinite(child.cropX) ? child.cropX : 0;
      let cy = Number.isFinite(child.cropY) ? child.cropY : 0;
      let cw = Number.isFinite(child.cropWidth) ? child.cropWidth : 1;
      let ch = Number.isFinite(child.cropHeight) ? child.cropHeight : 1;
      const fractional = cw <= 1 && ch <= 1 && cx <= 1 && cy <= 1;
      if (fractional) { cx = cx * iw; cy = cy * ih; cw = cw * iw; ch = ch * ih; }
      const sx = Math.max(0, Math.min(iw - 1, Math.round(cx)));
      const sy = Math.max(0, Math.min(ih - 1, Math.round(cy)));
      const sWidth = Math.max(1, Math.min(iw - sx, Math.round(cw)));
      const sHeight = Math.max(1, Math.min(ih - sy, Math.round(ch)));
      const noCrop = sx === 0 && sy === 0 && sWidth === iw && sHeight === ih;

      const result = { sx, sy, sWidth, sHeight, noCrop };

      // Store in cache before returning
      cropRectCache.set(cacheKey, result);

      return result;
    }

    function calculateElementPosition(child) {
      // For logos, use the full container dimensions without padding adjustments
      // The logo sizing will be handled in drawLogoElement based on paddingRatio
      return { newX: child.x, newY: child.y, realWidth: child.width, realHeight: child.height, padding: { left: 0, right: 0, top: 0, bottom: 0 } };
    }

    function debounce(fn, wait) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn.apply(null, args), wait); }; }

  function normalizeLetterSpacing(value) {
    const num = Number(value);
    return Number.isFinite(num) ? num : 0;
  }

  function measureTextWidth(ctx, text, letterSpacing = 0) {
    const str = String(text ?? '');
    if (!str) return 0;
    const baseWidth = ctx.measureText(str).width;
    if (!letterSpacing) return baseWidth;
    const glyphCount = Array.from(str).length;
    return baseWidth + letterSpacing * Math.max(0, glyphCount - 1);
  }

  function drawLineWithSpacing(ctx, text, anchorX, y, align, letterSpacing = 0) {
    const str = String(text ?? '');
    if (!str) return;
    const spacing = normalizeLetterSpacing(letterSpacing);
    const glyphs = Array.from(str);
    const totalWidth = measureTextWidth(ctx, str, spacing);
    let startX = anchorX;
    if (align === 'center') startX = anchorX - totalWidth / 2;
    else if (align === 'right') startX = anchorX - totalWidth;
    ctx.save();
    ctx.textAlign = 'left';
    let currentX = startX;
    for (let i = 0; i < glyphs.length; i++) {
      const glyph = glyphs[i];
      ctx.fillText(glyph, currentX, y);
      currentX += ctx.measureText(glyph).width;
      if (i < glyphs.length - 1) {
        currentX += spacing;
      }
    }
    ctx.restore();
  }

  function wrapText(ctx, text, maxWidth, letterSpacing = 0) {
    const perfStart = performance.now();
    const spacing = normalizeLetterSpacing(letterSpacing);

    // Generate cache key based on text, maxWidth, letterSpacing, and font
    const cacheKey = generateCacheKey(text, maxWidth, spacing, ctx.font);

    // Check cache first
    if (textWrapCache.has(cacheKey)) {
      cacheStats.textWrap.hits++;
      const perfEnd = performance.now();
      performanceProfile.textWrapping.total += perfEnd - perfStart;
      performanceProfile.textWrapping.count++;
      return textWrapCache.get(cacheKey);
    }

    cacheStats.textWrap.misses++;
    const finalLines = [];
    if (!text) {
      console.log(`[wrapText] Empty text, returning []`);
      textWrapCache.set(cacheKey, finalLines);
      return finalLines;
    }

      const paragraphs = String(text).split(/\r?\n/);
      for (const para of paragraphs) {
        if (!para.trim()) {
          finalLines.push('');
          continue;
        }

      const words = para.split(' ');
      let currentLine = '';
      for (const word of words) {
        const testLine = currentLine ? `${currentLine} ${word}` : word;
        if (measureTextWidth(ctx, testLine, spacing) > maxWidth && currentLine) {
          finalLines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) {
        finalLines.push(currentLine);
      }
    }

    // Second pass: handle any lines that are still too long (i.e., a single long word).
    // This is necessary because the first pass might leave a single word on a line by itself
    // which is still wider than the container.
    const resultLines = [];
    for (const line of finalLines) {
      const lineWidth = measureTextWidth(ctx, line, spacing);
      if (lineWidth > maxWidth) {
        console.log(`[wrapText] Line "${line.substring(0, 20)}" width ${lineWidth} > maxWidth ${maxWidth}, splitting by char`);
        let tempLine = '';
        for (const char of Array.from(line)) {
          const testTempLine = tempLine + char;
          if (measureTextWidth(ctx, testTempLine, spacing) <= maxWidth || Array.from(tempLine).length === 0) {
            tempLine = testTempLine;
          } else {
            resultLines.push(tempLine);
            tempLine = char;
          }
        }
        if (tempLine) resultLines.push(tempLine);
      } else {
        resultLines.push(line);
      }
    }
    console.log(`[wrapText] Returning ${resultLines.length} lines for text "${text.substring(0, 20)}..." (maxWidth=${maxWidth})`);

    // Store in cache before returning
    textWrapCache.set(cacheKey, resultLines);

    const perfEnd = performance.now();
    performanceProfile.textWrapping.total += perfEnd - perfStart;
    performanceProfile.textWrapping.count++;

    return resultLines;
  }

  function walkRichTextNodes(child) {
    const nodes = [];
    if (!child) return nodes;
    if (Array.isArray(child.richTextArr)) {
      const queue = [...child.richTextArr];
      while (queue.length) {
        const node = queue.shift();
        if (!node) continue;
        nodes.push(node);
        if (Array.isArray(node.words)) queue.push(...node.words);
        if (Array.isArray(node.chars)) queue.push(...node.chars);
      }
    }
    return nodes;
  }

  function normalizeFontStyle(value) {
    if (value === undefined || value === null) return null;
    const str = String(value).toLowerCase().trim();
    // If it's a number (like "400"), it's not a font style
    if (/^\d+$/.test(str)) return null;

    console.log('[Cache]   Crop Rect:', `${stats.stats.cropRect.hits} hits, ${stats.stats.cropRect.misses} misses`, `(${stats.sizes.cropRect} entries)`);
    console.log('[Cache]   Images:', `${stats.sizes.images} promise cached, ${stats.sizes.imageBlobs} blobs cached`);
    console.log('[Cache]   Fonts:', `${stats.sizes.fonts} promise cached, ${stats.sizes.fontData} data cached`);

    // Calculate hit rates
    const textWrapRate = stats.stats.textWrap.hits + stats.stats.textWrap.misses > 0
      ? ((stats.stats.textWrap.hits / (stats.stats.textWrap.hits + stats.stats.textWrap.misses)) * 100).toFixed(1)
      : '0.0';
    const gradientRate = stats.stats.gradient.hits + stats.stats.gradient.misses > 0
      ? ((stats.stats.gradient.hits / (stats.stats.gradient.hits + stats.stats.gradient.misses)) * 100).toFixed(1)
      : '0.0';
    const cropRectRate = stats.stats.cropRect.hits + stats.stats.cropRect.misses > 0
      ? ((stats.stats.cropRect.hits / (stats.stats.cropRect.hits + stats.stats.cropRect.misses)) * 100).toFixed(1)
      : '0.0';

    console.log('[Cache]   Hit rates: Text Wrap ' + textWrapRate + '%, Gradient ' + gradientRate + '%, Crop Rect ' + cropRectRate + '%');

    // Log performance profile
    console.log('[Performance] Render complete - Performance breakdown:');
    console.log('[Performance]   Total render time: ' + performanceProfile.totalRender.toFixed(2) + 'ms');
    console.log('[Performance]   Setup: ' + performanceProfile.renderSetup.toFixed(2) + 'ms');
    console.log('[Performance]   Font preloading: ' + performanceProfile.fontPreload.toFixed(2) + 'ms (' + performanceProfile.fontLoading.count + ' fonts)');
    console.log('[Performance]   Main render loop: ' + performanceProfile.mainRenderLoop.toFixed(2) + 'ms');
    console.log('[Performance]   Element drawing: ' + performanceProfile.elementDrawing.total.toFixed(2) + 'ms');
    console.log('[Performance]     - Text: ' + performanceProfile.elementDrawing.byType.text.total.toFixed(2) + 'ms (' + performanceProfile.elementDrawing.byType.text.count + ' elements)');
    console.log('[Performance]     - Shape: ' + performanceProfile.elementDrawing.byType.shape.total.toFixed(2) + 'ms (' + performanceProfile.elementDrawing.byType.shape.count + ' elements)');
    console.log('[Performance]     - Image: ' + performanceProfile.elementDrawing.byType.image.total.toFixed(2) + 'ms (' + performanceProfile.elementDrawing.byType.image.count + ' elements)');
    console.log('[Performance]     - Logo: ' + performanceProfile.elementDrawing.byType.logo.total.toFixed(2) + 'ms (' + performanceProfile.elementDrawing.byType.logo.count + ' elements)');
    console.log('[Performance]     - CTA: ' + performanceProfile.elementDrawing.byType.cta.total.toFixed(2) + 'ms (' + performanceProfile.elementDrawing.byType.cta.count + ' elements)');
    console.log('[Performance]   Font loading: ' + performanceProfile.fontLoading.total.toFixed(2) + 'ms (' + performanceProfile.fontLoading.count + ' loads)');
    console.log('[Performance]   Image loading: ' + performanceProfile.imageLoading.total.toFixed(2) + 'ms (' + performanceProfile.imageLoading.count + ' loads)');
    console.log('[Performance]   Text wrapping: ' + performanceProfile.textWrapping.total.toFixed(2) + 'ms (' + performanceProfile.textWrapping.count + ' calls)');
    console.log('[Performance]   Gradient creation: ' + performanceProfile.gradientCreation.total.toFixed(2) + 'ms (' + performanceProfile.gradientCreation.count + ' gradients)');

    // Top 3 slowest fonts
    if (performanceProfile.fontLoading.items.length > 0) {
      const topFonts = [...performanceProfile.fontLoading.items].sort((a, b) => b.duration - a.duration).slice(0, 3);
      console.log('[Performance]   Slowest fonts:');
      topFonts.forEach((f, i) => console.log(`[Performance]     ${i+1}. ${f.family}: ${f.duration.toFixed(2)}ms`));
    }

    // Top 3 slowest images
    if (performanceProfile.imageLoading.items.length > 0) {
      const topImages = [...performanceProfile.imageLoading.items].sort((a, b) => b.duration - a.duration).slice(0, 3);
      console.log('[Performance]   Slowest images:');
      topImages.forEach((img, i) => console.log(`[Performance]     ${i+1}. ${img.src}: ${img.duration.toFixed(2)}ms`));
    }

    return { boundingBoxes, dimensions: { width: baseWidth, height: baseHeight }, performanceProfile };
  }
  window.__renderTemplate = renderTemplate;
  window.__renderAndGetDataURL = async function (json, options = {}) {
    if (json) {
      window.__JSON_DATA__ = json;
    }
    const { boundingBoxes, dimensions } = await renderTemplate(options);
    const canvas = document.getElementById('myCanvas');
    return { dataUrl: canvas.toDataURL('image/png'), boundingBoxes, dimensions };
  };

  // --- FIX: Only auto-render if NOT in headless mode (API will call __renderAndGetDataURL explicitly) ---
  const params = new URLSearchParams(location.search);
  if (params.get('headless') !== '1') {
    renderTemplate().catch(console.error);
    window.addEventListener('resize', debounce(() => { renderTemplate().catch(console.error); }, 100));
  }
  // --- FIX END ---
  </script>
</body>

</html>
